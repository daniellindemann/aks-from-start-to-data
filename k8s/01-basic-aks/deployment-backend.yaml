apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: beer-rating-backend
  name: beer-rating-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: beer-rating-backend
  template:
    metadata:
      labels:
        app: beer-rating-backend
    spec:
      containers:
      - image: daniellindemann/beer-rating-backend:10
        name: beer-rating-backend
        imagePullPolicy: Always
        ports:
        - containerPort: 5179
        env:
        - name: Database__UseInMemoryDatabase
          value: 'false'
        - name: Database__UseAutoMigration
          value: 'false'
        - name: Database__UseDataSeeding
          value: 'true'
        - name: ConnectionStrings__Beer
          value: 'Server=tcp:beer-rating-db'
        resources:
          requests:
            cpu: 100m
            memory: 32Mi
          limits:
            cpu: 250m
            memory: 256Mi
      - image: daniellindemann/beer-rating-console-beerquotes:10
        name: beer-rating-console-beerquotes
        imagePullPolicy: Always
        env:
        - name: QuoteSleepInSeconds
          value: '30'
        resources:
          requests:
            cpu: 100m
            memory: 16Mi
          limits:
            cpu: 200m
            memory: 32Mi
